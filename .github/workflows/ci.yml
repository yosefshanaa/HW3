name: CI

# Automated quality gate: lint + tests + coverage on every push and PR.
# Enforces the project's quality standards (ruff-clean, >=85% coverage) in an
# environment that has never seen the code before — no manual review required.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install uv (and pin Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --extra dev --frozen

      - name: Lint (ruff — zero violations required)
        run: uv run ruff check

      - name: Test with coverage (gate: 85%)
        # Coverage fail_under=85 is configured in pyproject.toml, so a drop
        # below the threshold fails this step (and the build).
        run: uv run pytest
